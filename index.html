<html>
    <head>
        <title>GiantsMeet Login</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- FontAwesome Icons CDN -->
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css" integrity="sha384-SZXxX4whJ79/gErwcOYf+zWLeJdY/qpuqC4cAa9rOGUstPomtqpuNWT9wdPEn2fk" crossorigin="anonymous">
        <!-- Bootstrap 5 CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
        <!-- Main Core CSS  -->
        <link rel="stylesheet" href="./assets/css/main.css">
        <!-- Responsive CSS Mobile & Tablet | Different Screen Support -->
        <link rel="stylesheet" href="./assets/css/responsive.css">
    </head>
    <body >
        <!-- Logo  -->
        <div class=" logo">
            <h1>GiantsMeet</h1>
            <span>&nbsp;.com</span>
        </div>
        <!-- Main Content -->
        <div class="text-center row mainBody" id="mainBody">            
            <!-- Carousel -->
            <div class="col-xl-7 d-none d-xl-flex MainCarouselWrapper">
                <div id="MainCarousel" class="carousel slide MainCarousel" data-bs-ride="carousel">
                    <div class="carousel-indicators">
                      <button type="button" data-bs-target="#MainCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                      <button type="button" data-bs-target="#MainCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
                      <button type="button" data-bs-target="#MainCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="https://static.remove.bg/remove-bg-web/2a274ebbb5879d870a69caae33d94388a88e0e35/assets/before-after/s7-after-1edbc1a7d0ab603a9350aea651ed82070e7daee1a3b6120c8eedc0daa9c5eae0.png" class="d-block w-100" alt="...">
                        </div>
                        <div class="carousel-item">
                            <img src="https://static.remove.bg/remove-bg-web/2a274ebbb5879d870a69caae33d94388a88e0e35/assets/before-after/s7-after-1edbc1a7d0ab603a9350aea651ed82070e7daee1a3b6120c8eedc0daa9c5eae0.png" class="d-block w-100" alt="...">
                        </div>
                        <div class="carousel-item ">
                            <img src="https://static.remove.bg/remove-bg-web/2a274ebbb5879d870a69caae33d94388a88e0e35/assets/before-after/s7-after-1edbc1a7d0ab603a9350aea651ed82070e7daee1a3b6120c8eedc0daa9c5eae0.png" class="d-block w-100" alt="...">
                        </div>
                                 
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#MainCarousel" data-bs-slide="prev">
                      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                      <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#MainCarousel" data-bs-slide="next">
                      <span class="carousel-control-next-icon" aria-hidden="true"></span>
                      <span class="visually-hidden">Next</span>
                    </button>
                  </div>
            </div>

            <!-- Form -- Signup & Signin -->
            <div class="col-xl-5 col-sm-12 signupFormWrapper">
                <div class="signupForm">
                    <h1>Create</h1>
                    <h1>Account</h1>
    
                    <div class="form-group-new">
                        <input class="form-control-new" type="number" placeholder="Enter Phone No">
                        <Button>Go</Button>
                    </div>
    
                    <div class="socialMediaLoginBar">
                        <h4>Sign Up Free Through</h4>                
                        <div class="socialBtnList">
                            <div class="socialBtnGroup">
                                <div class="socialBtn"><img src="./assets/images/logo/facebook.svg" alt=""></div>
                                <div class="socialBtn"><img src="./assets/images/logo/google.svg" alt=""></div>                                
                            </div>
                            <div class="socialBtnGroup">
                                <div class="socialBtn"><img src="./assets/images/logo/twitter.svg" alt=""></div>
                                <div class="socialBtn"><img src="./assets/images/logo/github.svg" alt=""></div>
                            </div>
                        </div>
                    </div>

                    <div class="signinBtn">Sign In&nbsp;&nbsp;<i class="far fa-hand-point-right"></i></div>
                </div>
            </div>
        </div>

        <!-- Overlay Layout for OTP verification  -->
        <div class="OTPoverlay">
            <div class="wrapper">
                <div class="header">
                    <a class="e1">Verify OTP</a>
                    <a class="e2">Otp has been sent to +919333584419</a>
                </div>
                <div class="content">
                    <form method="get" class="digit-group" data-group-name="digits" data-autosubmit="false" autocomplete="off">
                        <input type="text" id="digit-1" name="digit-1" data-next="digit-2" placeholder="*" />
                        <input type="text" id="digit-2" name="digit-2" data-next="digit-3" data-previous="digit-1" placeholder="*" />
                        <input type="text" id="digit-3" name="digit-3" data-next="digit-4" data-previous="digit-2" placeholder="*" />
                        <input type="text" id="digit-4" name="digit-4" data-next="digit-5" data-previous="digit-3" placeholder="*" />
                    </form>
                </div>
                <div class="footer">
                    <button>Cancel</button>
                    <button>Proceed</button>
                </div>
            </div>
        </div>

        <!-- JavaScript Bundle with Popper -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js" integrity="sha384-JEW9xMcG8R+pH31jmWH6WWP0WintQrMb4s7ZOdauHnUtxwoG2vI5DkLtS3qm9Ekf" crossorigin="anonymous"></script>
        
        <!-- Script to add responisiveness -->
        <script>
            const resizeElementsAuto = ()=>{
                document.getElementById("mainBody").style.height=`${window.screen.height-document.querySelector(".logo").clientHeight}px`;
            }

            resizeElementsAuto();

            window.onresize = resizeElementsAuto;
        </script>
        <!-- Script to go next field of otp -->
        <script>
            $('.digit-group').find('input').each(function() {
                $(this).attr('maxlength', 1);
                $(this).on('keyup', function(e) {
                    var parent = $($(this).parent());
                    
                    if(e.keyCode === 8 || e.keyCode === 37) {
                        var prev = parent.find('input#' + $(this).data('previous'));
                        
                        if(prev.length) {
                            $(prev).select();
                        }
                    } else if((e.keyCode >= 48 && e.keyCode <= 57) || (e.keyCode >= 65 && e.keyCode <= 90) || (e.keyCode >= 96 && e.keyCode <= 105) || e.keyCode === 39) {
                        var next = parent.find('input#' + $(this).data('next'));
                        
                        if(next.length) {
                            $(next).select();
                        } else {
                            if(parent.data('autosubmit')) {
                                parent.submit();
                            }
                        }
                    }
                });
            });
        </script>
    </body>
</html>
